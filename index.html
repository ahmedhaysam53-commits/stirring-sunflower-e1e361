<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>النظام المحاسبي</title>
    <link rel="stylesheet" href="public/styles.css?v=20250307-3" />
  </head>
  <body>
    <section class="pin-screen" id="pin-screen">
      <div class="card">
        <div class="card__header">
          <div class="logo">🔒</div>
          <div>
            <h1>شاشة دخول</h1>
            <p class="subtitle">أدخل رمز الدخول المكوّن من 6 أرقام</p>
          </div>
        </div>
        <form class="card__form" id="pin-form">
          <div class="field">
            <label class="field__label" for="pin-input">رمز الدخول</label>
            <input
              id="pin-input"
              class="pin-input"
              type="text"
              inputmode="numeric"
              maxlength="6"
              pattern="[0-9]{6}"
              required
            />
          </div>
          <button class="primary" type="submit">دخول</button>
          <p class="status" id="pin-status"></p>
        </form>
      </div>
    </section>
    <header class="app-header">
      <h1>النظام المحاسبي</h1>
      <div class="user-actions" id="user-actions">
        <button class="secondary" id="logout" type="button" hidden>تسجيل خروج</button>
      </div>
    </header>

    <main class="container">
      <section class="auth-panel" id="auth-panel" hidden>
        <div class="auth-card">
          <h2>تسجيل الدخول</h2>
          <form id="login-form">
            <label>
              البريد الإلكتروني
              <input type="email" name="email" required />
            </label>
            <label>
              كلمة المرور
              <input type="password" name="password" required />
            </label>
            <button type="submit">دخول</button>
          </form>
          <p class="hint">ليس لديك حساب؟ استخدم نموذج التسجيل بالأسفل.</p>
        </div>

        <div class="auth-card">
          <h2>تسجيل جديد</h2>
          <form id="register-form">
            <label>
              الاسم
              <input type="text" name="name" required />
            </label>
            <label>
              البريد الإلكتروني
              <input type="email" name="email" required />
            </label>
            <label>
              كلمة المرور
              <input type="password" name="password" required />
            </label>
            <button type="submit">إنشاء حساب</button>
          </form>
        </div>
      </section>

      <section class="app-layout" id="app-layout" hidden>
        <aside class="sidebar">
          <h3 id="menu-title">القائمة</h3>
          <div id="menu-panel">
            <div class="sidebar-actions">
              <button class="sidebar-btn" type="button">المالية</button>
              <button class="sidebar-btn" type="button">اليومية</button>
            </div>
            <nav class="menu" id="menu">
              <button class="menu-item" data-screen="accounts">دليل الحسابات</button>
              <button class="menu-item" data-screen="journals">القيود اليومية</button>
              <button class="menu-item" data-screen="customers">العملاء</button>
              <button class="menu-item" data-screen="suppliers">الموردين</button>
              <button class="menu-item" data-screen="receipts">سندات قبض</button>
              <button class="menu-item" data-screen="payments">سندات صرف</button>
              <button class="menu-item" data-screen="reports">التقارير</button>
            </nav>
          </div>
        </aside>

        <section class="content">
          <div id="screen-title" class="screen-title">اختر شاشة من القائمة</div>
          <div class="screen-buttons" id="screen-buttons">
            <button class="screen-btn" type="button" data-screen="screen-1">شاشة 1</button>
            <button class="screen-btn" type="button" data-screen="screen-2">شاشة 2</button>
            <button class="screen-btn" type="button" data-screen="screen-3">شاشة 3</button>
            <button class="screen-btn" type="button" data-screen="screen-4">شاشة 4</button>
            <button class="screen-btn" type="button" data-screen="screen-5">شاشة 5</button>
            <button class="screen-btn" type="button" data-screen="screen-6">شاشة 6</button>
            <button class="screen-btn" type="button" data-screen="screen-7">شاشة 7</button>
            <button class="screen-btn" type="button" data-screen="screen-8">شاشة 8</button>
            <button class="screen-btn" type="button" data-screen="screen-9">شاشة 9</button>
            <button class="screen-btn" type="button" data-screen="screen-10">شاشة 10</button>
          </div>
          <div id="screen-body"></div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast"></div>

    <p class="hint" style="text-align:center;">إصدار: 20250307-3</p>
    <script src="public/app.js?v=20250307-3"></script>
  </body>
</html>
