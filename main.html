<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>الشاشة الرئيسية</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="excel-screen">
      <section class="excel-card" aria-labelledby="excel-title">
        <header class="excel-header">
          <div>
            <h2 id="excel-title">لوحة البيانات</h2>
            <p class="subtitle">مرحباً بك في الشاشة الرئيسية</p>
          </div>
          <a class="secondary" href="index.html">تسجيل خروج</a>
        </header>

        <div class="excel-toolbar" aria-label="شريط الأدوات">
          <span>ملف</span>
          <span>تحرير</span>
          <span>عرض</span>
          <span>إدراج</span>
          <span>تنسيق</span>
          <span>بيانات</span>
          <span>مساعدة</span>
        </div>

        <section class="main-layout" aria-label="القائمة الرئيسية">
          <aside class="side-box" aria-label="القائمة الجانبية">
            <h3 class="menu-title">القائمة</h3>
            <nav id="menu-container" class="menu-list" aria-label="شاشات النظام"></nav>
          </aside>
          <section class="content-box" aria-live="polite">
            <div class="content-header">
              <h3 id="screen-title">اختر شاشة من القائمة</h3>
              <p class="subtitle" id="screen-description">سيتم عرض تفاصيل الشاشة هنا.</p>
            </div>
            <div class="content-body" id="screen-body">
              <div class="placeholder-card">
                <h4>جاهز للعمل المحاسبي</h4>
                <p>اختر شاشة لعرض الأدوات والتقارير الخاصة بها.</p>
              </div>
            </div>
          </section>
        </section>
        <section class="tree-section" id="finance-tree" hidden>
          <header class="tree-header">
            <h3>شجرة الحسابات</h3>
            <button class="secondary" type="button" id="close-tree">إخفاء</button>
          </header>
          <div class="tree-actions">
            <button class="btn btn-add" type="button" id="tree-add">إضافة حساب +</button>
            <button class="btn btn-edit" type="button" id="tree-edit">تعديل حساب</button>
            <button class="btn btn-delete" type="button" id="tree-delete">حذف حساب</button>
          </div>
          <div class="tree-container" id="tree-container"></div>
        </section>
        
      </section>
    </main>
    <script src="main.js"></script>
    <script src="reload.js"></script>
  </body>
</html>
