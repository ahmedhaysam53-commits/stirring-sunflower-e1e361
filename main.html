<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>الشاشة الرئيسية</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="excel-screen">
      <section class="excel-card" aria-labelledby="excel-title">
        <header class="excel-header">
          <div>
            <h2 id="excel-title">لوحة البيانات</h2>
            <p class="subtitle">مرحباً بك في الشاشة الرئيسية</p>
          </div>
          <a class="secondary" href="index.html">تسجيل خروج</a>
        </header>

        <div class="excel-toolbar" aria-label="شريط الأدوات">
          <span>ملف</span>
          <span>تحرير</span>
          <span>عرض</span>
          <span>إدراج</span>
          <span>تنسيق</span>
          <span>بيانات</span>
          <span>مساعدة</span>
        </div>

        <section class="main-layout" aria-label="القائمة الرئيسية">
          <aside class="side-box" aria-label="القائمة الجانبية">
            <button class="hub-btn hub-main" type="button" id="btn-1" data-key="1">
              زر الرئيسية
            </button>
            <div class="dropdown" id="dropdown" hidden>
              <button class="dropdown-item" type="button" id="btn-2" data-key="2">2</button>
              <button class="dropdown-item" type="button" id="btn-3" data-key="3">3</button>
              <button class="dropdown-item" type="button" id="btn-4" data-key="4">4</button>
              <button class="dropdown-item" type="button" id="btn-5" data-key="5">5</button>
              <button class="dropdown-item" type="button" id="btn-6" data-key="6">6</button>
              <button class="dropdown-item" type="button" id="btn-7" data-key="7">7</button>
              <button class="dropdown-item" type="button" id="btn-8" data-key="8">8</button>
              <button class="dropdown-item" type="button" id="btn-9" data-key="9">9</button>
              <button class="dropdown-item" type="button" id="btn-10" data-key="10">10</button>
              <button class="dropdown-item" type="button" id="btn-11" data-key="11">11</button>
            </div>
          </aside>
        </section>

        
      </section>
    </main>
    <script src="main.js"></script>
    <script src="reload.js"></script>
  </body>
</html>
